version: '3.9'
services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports: ["8000:8000"]
    environment:
      DATABASE_URL: postgresql+asyncpg://hookshot:hookshot@db:5432/hookshot
      REDIS_URL: redis://redis:6379/0
    depends_on: [db, redis]

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    command: celery -A worker.celery_app worker --beat --loglevel=info --concurrency=4
    environment:
      DATABASE_URL: postgresql+asyncpg://hookshot:hookshot@db:5432/hookshot
      REDIS_URL: redis://redis:6379/0
    depends_on: [db, redis]

  db:
    image: postgres:16
    environment:
      POSTGRES_USER: hookshot
      POSTGRES_PASSWORD: hookshot
      POSTGRES_DB: hookshot
    volumes: [postgres_data:/var/lib/postgresql/data]

  redis:
    image: redis:7-alpine

volumes:
  postgres_data:
