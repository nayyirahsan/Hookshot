services:
  - type: web
    name: hookshot-api
    runtime: docker
    dockerfilePath: ./Dockerfile.api
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: hookshot-db
          property: connectionString
      - key: REDIS_URL
        sync: false

  - type: worker
    name: hookshot-worker
    runtime: docker
    dockerfilePath: ./Dockerfile.worker
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: hookshot-db
          property: connectionString
      - key: REDIS_URL
        sync: false

databases:
  - name: hookshot-db
    plan: free
